name: perf-bench

# Deterministic performance bench (benchmarks/perf). Unlike security-bench
# this needs no API key and no network — the scenarios drive the real
# backend services with fake model clients and a deterministic embedder —
# so it is cheap enough to run on every PR that touches the perf surface.
# ``run_perf.py`` exits 1 when a gate in benchmarks/perf_thresholds.json is
# breached, so the gate is just workflow wiring.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "backend/services/**"
      - "backend/db.py"
      - "backend/models.py"
      - "benchmarks/perf/**"
      - "benchmarks/perf_thresholds.json"
      - ".github/workflows/perf-bench.yml"

permissions:
  contents: read

jobs:
  perf:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run perf scenarios
        run: |
          python benchmarks/perf/run_perf.py \
            --scenario all --output benchmarks/perf_results.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: benchmarks/perf_results.json
